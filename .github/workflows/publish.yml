name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'   # trigger on version tags: v1.0.0, v1.2.3, etc.

jobs:
  publish:
    runs-on: windows-latest   # net8.0-windows requires Windows runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack src/Jagwit.Winforms.Helpers/Jagwit.Winforms.Helpers.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }} --output ./artifacts

      - name: List artifacts
        run: ls ./artifacts

      - name: Push to NuGet.org
        run: dotnet nuget push "./artifacts/Jagwit.Winforms.Helpers.${{ steps.version.outputs.VERSION }}.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbols to NuGet.org
        run: dotnet nuget push "./artifacts/Jagwit.Winforms.Helpers.${{ steps.version.outputs.VERSION }}.snupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
